<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Add Book</h2>

<form th:action="@{/saveBook}" th:object="${book}" method="post">
    Title: <input type="text" th:field="*{title}" /><br><br>
    Author: <input type="text" th:field="*{author}" /><br><br>
    Price: <input type="number" th:field="*{price}" /><br><br>
    Stock: <input type="number" th:field="*{stock}" /><br><br>
    <button type="submit">Save</button>
</form>

</body>
</html>
